databases:
  - name: gestao_os
    plan: free
    databaseName: gestao_os
    user: gestao_os

services:
  - type: web
    plan: free
    name: gestao_os
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn gestao_os.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gestao_os
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4