{% extends "base.html" %}

{% block conteudo %}

    {% if not validlink %}
        <div class="row">
            <div class="col text-center">
                <div class="alert alert-danger" role="alert">
                    <p>O link informado não é válido. Por favor verifique novamente o seu e-mail</p>
                </div>
            </div>
        </div>
    {% else %}
    <div class="row mt-3">
        <div class="col text-center">
            <h2>Informe e confirme a nova senha</h2>
        </div>
    </div>
    <hr>

    <form action="" method="post">
        {% csrf_token %}
        
        <div class="row justify-content-center mt-3">
            <div class="col-3">
                <div class="form-floating">
                    <input
                        type="password"
                        name="new_password1"
                        id="new_password1"
                        class="form-control"
                        placeholder="Senha"
                        required>
                    <label for="new_password1" class="form-label">Senha</label>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mt-2">
            <div class="col-3">
                <div class="form-floating">
                    <input
                        type="password"
                        name="new_password2"
                        id="new_password2"
                        class="form-control"
                        placeholder="Confirmação de Senha"
                        required>
                    <label for="new_password2" class="form-label">Confirmação de Senha</label>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mt-2">
            <div class="col-3 d-grid">
                <button type="submit" class="btn btn-primary">Confirmar</button>
            </div>
        </div>
    </form>
    {% endif %}

{% endblock conteudo %}
