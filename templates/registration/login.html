{% extends "base.html" %}

{% block titulo %}Gestão de OS - Login{% endblock titulo %}

{% block conteudo %}
    <div class="row">
        <div class="col text-center"><h2>Login</h2></div>
    </div>
    <hr>

    <form action="" method="post">
        {% csrf_token %}

        <div class="row justify-content-center">
            <div class="col-3">
                <div class="form-floating">
                    <input
                        type="text"
                        name="username"
                        autofocus
                        autocomplete="username"
                        id="id_username"
                        class="form-control"
                        placeholder="Nome de usuário"
                        required>
                    <label for="id_username">Nome de Usuário</label>
                </div>
            </div>
        </div>

        <div class="row my-2"></div>

        <div class="row justify-content-center">
            <div class="col-3">
                <div class="form-floating">
                    <input
                        type="password"
                        name="password"
                        autofocus
                        autocomplete="password"
                        id="id_password"
                        class="form-control"
                        placeholder="Senha"
                        required>
                    <label for="id_password">Senha</label>
                </div>
            </div>
        </div>

        <div class="row mt-3 justify-content-center">
            <div class="col-3 d-grid">
                <button type="submit" class="btn btn-primary">Enviar</button>
            </div>
        </div>
        <hr>
        <div class="row mt-2 justify-content-center">
            <div class="col-2 text-center">
                <a href="{% url "registro:pre_registro" %}">Não tenho cadastro</a>
            </div>
            <div class="col-2 text-center">
                <a href="{% url "password_reset" %}">Esqueci a minha senha</a>
            </div>
        </div>
    </form>
{% endblock conteudo %}
